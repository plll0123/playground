services:
  nginx-proxy:
    image: nginx:latest
    ports:
      - "80:80"
      - "81:81"
    volumes:
#      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-1
      - backend-2
      - backend-3
      - internal-backend-1
      - internal-backend-2

  backend-1:
    build: .
    expose:
      - "8080"
    environment:
      - SERVER_NAME=Backend-Instance-1

  backend-2:
    build: .
    expose:
      - "8080"
    environment:
      - SERVER_NAME=Backend-Instance-2

  ## 상태를 반환하지 못함
  backend-3:
    build: .
    expose:
      - "8080"
    environment:
      - SERVER_NAME=UnHealth-Instance


  internal-backend-1:
    build: .
    expose:
      - "8080"
    environment:
      - SERVER_NAME=Internal-Backend-Instance-1

  internal-backend-2:
    build: .
    expose:
      - "8080"
    environment:
      - SERVER_NAME=Internal-Backend-Instance-2

  admin-1:
    build: .
    expose:
      - "8080"
    environment:
      - SERVER_NAME=Admin-Instance-

  payment-1:
    build: .
    expose:
      - "8080"
    environment:
      - SERVER_NAME=Payment-Instance-1