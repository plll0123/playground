services:
  nginx-proxy:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-1
      - backend-2

  backend-1:
    build: .
    expose:
      - "8080"
    environment:
      - SERVER_NAME=Backend-Instance-1

  backend-2:
    build: .
    expose:
      - "8080"
    environment:
      - SERVER_NAME=Backend-Instance-2