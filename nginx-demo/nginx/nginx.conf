# 전역(Core) 설정
user nginx;
worker_processes auto;
events {
    worker_connections 1024;
}

stream {
    upstream tcp_test_backend {
        hash $remote_addr consistent;

        server internal-backend-1:8080;
        server internal-backend-2:8080;
    }

    server {
        listen 81;
        proxy_pass tcp_test_backend;
    }
}

# =============================================================
# [L7 영역] HTTP 프록시 (기존 설정 그대로 가져오기)
# =============================================================
http {
    sendfile on;

    gzip on;

    # 도커 Nginx의 기본 MIME 타입 설정 포함 (중요)
    # noinspection ALL
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 기존 타겟 그룹들
    upstream admin {
        server admin-1:8080;
    }

    upstream user {
        server backend-1:8080 max_fails=2 fail_timeout=10;
        server backend-2:8080 max_fails=2 fail_timeout=10;
        server backend-3:8888 max_fails=2 fail_timeout=10;
    }

    upstream payment {
        server payment-1:8080;
    }

    # 기존 user.playground 서버 블록
    server {
        server_name user.playground;
        listen 80;

        # 보안 헤더들
        add_header X-Frame-Options         "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options  "nosniff"                         always;
        add_header X-XSS-Protection        "1; mode=block"                   always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self';"             always;

        location / {
            proxy_pass http://user;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Proxy-Host $proxy_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /payment {
            rewrite ^ / break;
            proxy_pass http://payment;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Proxy-Host $proxy_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # 기존 admin.playground 서버 블록
    server {
        server_name admin.playground;
        listen 80;

        add_header X-Frame-Options         "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options  "nosniff"                         always;
        add_header X-XSS-Protection        "1; mode=block"                   always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self';"             always;

        location / {
            proxy_pass http://admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Proxy-Host $proxy_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}